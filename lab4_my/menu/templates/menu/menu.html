{% extends "menu/base.html" %}
{% block title %}Меню{% endblock %}
{% block content %}
<h1>Меню</h1>
{% for c in categories %}
  <h2>{{ c.name }}</h2>
  <ul>
    {% for d in c.dishes %}
      <li>
        <a href="{% url 'menu:dish_detail' d.id %}">{{ d.name }}</a> — {{ d.price }} грн
      </li>
    {% endfor %}
  </ul>
{% endfor %}
{% endblock %}
