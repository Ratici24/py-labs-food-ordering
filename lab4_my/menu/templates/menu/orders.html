{% extends "menu/base.html" %}
{% block title %}Замовлення{% endblock %}
{% block content %}
<h1>Замовлення</h1>
<table>
  <tr><th>ID</th><th>Клієнт</th><th>Страва</th><th>К-сть</th><th>Статус</th></tr>
  {% for o in orders %}
  <tr>
    <td>{{ o.id }}</td>
    <td>{{ o.customer_name }}</td>
    <td>{{ o.dish_name }}</td>
    <td>{{ o.quantity }}</td>
    <td>{{ o.status }}</td>
  </tr>
  {% empty %}
  <tr><td colspan="5">Замовлень поки немає</td></tr>
  {% endfor %}
</table>
{% endblock %}
