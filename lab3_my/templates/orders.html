{% extends "base.html" %}
{% block title %}Замовлення{% endblock %}
{% block content %}
<h1>Замовлення</h1>
<table border="1">
  <tr><th>ID</th><th>Клієнт</th><th>Позиції</th><th>Статус</th><th>Змінити</th></tr>
  {% for o in orders %}
  <tr>
    <td>{{ o.id }}</td>
    <td>{{ o.customer_name }}</td>
    <td>{{ o.items_text }}</td>
    <td>{{ o.status }}</td>
    <td>
      <form method="post" action="/orders/{{ o.id }}/status">
        <select name="status">
          <option value="pending" {% if o.status=='pending' %}selected{% endif %}>pending</option>
          <option value="cooking" {% if o.status=='cooking' %}selected{% endif %}>cooking</option>
          <option value="done" {% if o.status=='done' %}selected{% endif %}>done</option>
        </select>
        <button>OK</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
